name: openmandi_ui
description: Shared design system, models, and widgets for OpenMandi farmer & dealer apps.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  intl: ^0.19.0
  supabase_flutter: ^2.8.0
  geolocator: ^13.0.1
  google_maps_flutter: ^2.6.1
  record: ^5.1.2
  audioplayers: ^6.0.0
  path_provider: ^2.1.3
  http: ^1.2.1

flutter:
  uses-material-design: true

dependency_overrides:
  record_linux: 1.3.0
